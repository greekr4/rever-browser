<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181f31"/>
      <stop offset="0.55" stop-color="#0d1220"/>
      <stop offset="1" stop-color="#06080f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="gViolet" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#99f6e4" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#67e8f9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect x="50" y="50" width="924" height="924" rx="206" fill="url(#bg)"/>
  <rect x="53.5" y="53.5" width="917" height="917" rx="202" fill="none" stroke="url(#edge)" stroke-width="3"/>

  <g filter="url(#soft)">
    <!-- teal segment: bottom -> right, arrow sweeping up (CCW) -->
    <path d="M537.3 800.9 A290 290 0 0 0 800.9 537.3" fill="none" stroke="url(#gTeal)" stroke-width="84" stroke-linecap="round"/>
    <polygon points="723.2,530.5 878.6,544.1 809.6,437.7" fill="#5eead4"/>

    <!-- violet segment: left -> bottom-left, arrow sweeping down-right (CCW) -->
    <path d="M249.2 389.4 A290 290 0 0 0 345.7 749.6" fill="none" stroke="url(#gViolet)" stroke-width="84" stroke-linecap="round"/>
    <polygon points="390.4,685.7 300.9,813.5 427.6,807.0" fill="#c4b5fd"/>

    <!-- amber segment: top-right -> top-left, arrow sweeping left (CCW) -->
    <path d="M749.6 345.7 A290 290 0 0 0 389.4 249.2" fill="none" stroke="url(#gAmber)" stroke-width="84" stroke-linecap="round"/>
    <polygon points="422.4,319.9 356.4,178.5 298.8,291.5" fill="#fde68a"/>
  </g>

  <!-- AI core: glow + four-point sparkle -->
  <circle cx="512" cy="512" r="190" fill="url(#glow)"/>
  <path d="M512 382 Q534 490 642 512 Q534 534 512 642 Q490 534 382 512 Q490 490 512 382 Z" fill="url(#gCore)"/>
  <path d="M645 361 Q652 388 679 395 Q652 402 645 429 Q638 402 611 395 Q638 388 645 361 Z" fill="#a5f3fc"/>
</svg>